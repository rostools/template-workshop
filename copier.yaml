_subdirectory: "template"

# Message to show after generating or regenerating the project successfully
_message_after_copy: |

  Your project "{{ github_repo }}" has been created successfully!  See the
  [template's guide](https://template-workshop.rostools.org/docs/guide) as well
  as the "TODO.md" file in the newly created project for more details on the
  next steps.

# Questions
for_rostools:
  type: bool
  help: "Is this repository part of rostools?"
  default: false

workshop_type:
  type: str
  help: "What type of workshop is this?"
  choices:
    - r
    - general

github_user:
  type: str
  help: |
    What is the name of the GitHub user or organization where the
    template repository will be or is stored?
  default: >-
    {{ "rostools" if for_rostools else "" }}

github_repo:
  type: str
  help: |
    What is the name of the GitHub repository where the template will be or
    is stored? We strongly recommend using the default given.
  default: "{{ _folder_name }}"

# Configurations not asked
github_repo_spec:
  type: str
  default: "{{ github_user }}/{{ github_repo }}"
  when: false
